name: Repo Standards

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:
    inputs:
      config-path:
        description: Path to the caller repository standards config file.
        required: false
        type: string
        default: .github/repo-standards/config.env
      check-directory:
        description: Optional path to caller repository standards check scripts.
        required: false
        type: string
        default: ''
      policy-categories:
        description: Comma-separated bundled policy categories to run. Empty or all runs every category.
        required: false
        type: string
        default: ''
      post-pr-comment:
        description: Whether to create or update a pull request status comment.
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: repo-standards-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repo-standards:
    name: Validate repository standards
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v7

      - name: Checkout standards action
        uses: actions/checkout@v7
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .repo-standards-action

      - name: Run categorized policy checks
        id: standards
        uses: ./.repo-standards-action/.github/actions/repo-standards
        with:
          config-path: ${{ inputs['config-path'] || '' }}
          check-directory: ${{ inputs['check-directory'] || '' }}
          policy-categories: ${{ inputs['policy-categories'] || '' }}

      - name: Update pull request status comment
        if: ${{ always() && github.event_name == 'pull_request' && toJSON(inputs['post-pr-comment']) != 'false' }}
        continue-on-error: true
        uses: ./.repo-standards-action/.github/actions/repo-standards-comment
        with:
          exit-code: ${{ steps.standards.outputs.exit_code }}
          summary-file: ${{ steps.standards.outputs.summary_file }}
