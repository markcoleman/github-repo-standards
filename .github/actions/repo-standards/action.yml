name: Repository Standards
description: Run categorized repository standards policies and write a Markdown summary.

inputs:
  config-path:
    description: Optional path to a repository standards config file.
    required: false
    default: ''
  check-directory:
    description: Optional path to additional repository standards check scripts.
    required: false
    default: ''
  policy-categories:
    description: Comma-separated policy categories to run. Empty or all runs every bundled category.
    required: false
    default: ''
  summary-file:
    description: Optional Markdown summary output path.
    required: false
    default: ''

outputs:
  exit_code:
    description: Exit code from the standards runner.
    value: ${{ steps.standards.outputs.exit_code }}
  summary_file:
    description: Markdown summary file path.
    value: ${{ steps.standards.outputs.summary_file }}

runs:
  using: composite
  steps:
    - name: Run categorized policy checks
      id: standards
      shell: bash
      env:
        INPUT_CHECK_DIRECTORY: ${{ inputs.check-directory }}
        INPUT_CONFIG_PATH: ${{ inputs.config-path }}
        INPUT_POLICY_CATEGORIES: ${{ inputs.policy-categories }}
        INPUT_SUMMARY_FILE: ${{ inputs.summary-file }}
        LEGACY_CHECK_DIRECTORY: .github/repo-standards/checks
      run: |
        set +e

        summary_file="$INPUT_SUMMARY_FILE"
        if [[ -z "$summary_file" ]]; then
          summary_file="$RUNNER_TEMP/repo-standards-summary.md"
        fi

        check_args=()
        if [[ -d "$LEGACY_CHECK_DIRECTORY" ]]; then
          check_args+=(--checks "$LEGACY_CHECK_DIRECTORY")
        fi
        if [[ -n "$INPUT_CHECK_DIRECTORY" ]]; then
          if [[ "$INPUT_CHECK_DIRECTORY" != "$LEGACY_CHECK_DIRECTORY" ]]; then
            check_args+=(--checks "$INPUT_CHECK_DIRECTORY")
          fi
        fi

        policy_args=(--policies "$GITHUB_ACTION_PATH/policies")
        if [[ -n "$INPUT_POLICY_CATEGORIES" ]]; then
          IFS=',' read -ra requested_categories <<< "$INPUT_POLICY_CATEGORIES"
          for requested_category in "${requested_categories[@]}"; do
            requested_category="${requested_category#"${requested_category%%[![:space:]]*}"}"
            requested_category="${requested_category%"${requested_category##*[![:space:]]}"}"
            if [[ -n "$requested_category" ]]; then
              policy_args+=(--policy-category "$requested_category")
            fi
          done
        fi

        config_args=()
        if [[ -n "$INPUT_CONFIG_PATH" && -f "$INPUT_CONFIG_PATH" ]]; then
          config_args=(--config "$INPUT_CONFIG_PATH")
        else
          config_args=(--config "$GITHUB_ACTION_PATH/config.env")
        fi

        "$GITHUB_ACTION_PATH/validate-repo-standards.sh" \
          "${config_args[@]}" \
          "${policy_args[@]}" \
          "${check_args[@]}" \
          --summary-file "$summary_file"
        status=$?

        {
          echo "exit_code=$status"
          echo "summary_file=$summary_file"
        } >> "$GITHUB_OUTPUT"

        if [[ -f "$summary_file" ]]; then
          cat "$summary_file" >> "$GITHUB_STEP_SUMMARY"
        fi

        exit "$status"
