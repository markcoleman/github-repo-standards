name: Repository Standards Comment
description: Create or update the repository standards pull request status comment.

inputs:
  exit-code:
    description: Exit code from the repository standards check action.
    required: true
  summary-file:
    description: Markdown summary file produced by the repository standards check action.
    required: true
  marker:
    description: Hidden marker used to find an existing status comment.
    required: false
    default: '<!-- repo-standards-status -->'

outputs:
  comment_id:
    description: Created or updated pull request comment ID.
    value: ${{ steps.comment.outputs.comment_id }}
  operation:
    description: Whether the action created or updated the comment.
    value: ${{ steps.comment.outputs.operation }}

runs:
  using: composite
  steps:
    - name: Create or update pull request status comment
      id: comment
      uses: actions/github-script@v9
      env:
        EXIT_CODE: ${{ inputs.exit-code }}
        MARKER: ${{ inputs.marker }}
        SUMMARY_FILE: ${{ inputs.summary-file }}
      with:
        script: |
          const fs = require('fs');
          const marker = process.env.MARKER;
          const summaryPath = process.env.SUMMARY_FILE;
          const summary = fs.existsSync(summaryPath)
            ? fs.readFileSync(summaryPath, 'utf8')
            : 'Repository standards did not produce a summary.';
          const passed = Number(process.env.EXIT_CODE) === 0;
          const statusIcon = passed ? '✅' : '❌';
          const statusText = passed ? 'passed' : 'needs attention';
          const statusMessage = passed
            ? 'All configured repository standards are passing.'
            : 'One or more repository standards need attention before this pull request is ready.';
          const runUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const visualSummary = summary
            .replace(/^## Repository Standards\s*/m, '')
            .replaceAll('| PASS |', '| ✅ Pass |')
            .replaceAll('| FAIL |', '| ❌ Fail |')
            .trim();
          const body = [
            marker,
            `## ${statusIcon} Repository standards ${statusText}`,
            '',
            statusMessage,
            '',
            visualSummary,
            '',
            '---',
            '',
            `_Last updated by **${context.workflow}** on ${new Date().toISOString()} · [View workflow run](${runUrl})_`
          ].join('\n');

          const {owner, repo} = context.repo;
          const issue_number = context.issue.number;
          const {data: comments} = await github.rest.issues.listComments({
            owner,
            repo,
            issue_number,
            per_page: 100
          });
          const existing = comments.find((comment) => comment.body?.includes(marker));

          if (existing) {
            const {data: updated} = await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existing.id,
              body
            });
            core.setOutput('comment_id', String(updated.id));
            core.setOutput('operation', 'updated');
          } else {
            const {data: created} = await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body
            });
            core.setOutput('comment_id', String(created.id));
            core.setOutput('operation', 'created');
          }
